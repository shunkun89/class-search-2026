<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>クラス検索</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            padding: 30px;
        }
        input {
            font-size: 18px;
            padding: 8px;
            width: 200px;
        }
        button {
            font-size: 18px;
            padding: 8px 20px;
            margin-top: 10px;
        }
        .result {
            margin-top: 20px;
            font-size: 20px;
            color: blue;
        }
        .error {
            margin-top: 20px;
            color: red;
        }
    </style>
</head>
<body>

<h2>受験番号を入力してください</h2>

<form method="POST">
    <input type="text" name="exam_number" placeholder="受験番号" required>
    <br><br>
    <input type="text" name="birth_date" placeholder="生年月日（例：20080415）" required>
    <br>
    <button type="submit">検索</button>
</form>

{% if result %}
<div class="result">
    {{ result.sei }} {{ result.mei }} さん<br>
    出身中学校：{{ result.school }}<br><br>

    あなたのクラスは<br>
    <strong>{{ result.class }}</strong><br>
    出席番号は<br>
    <strong>{{ result.number }}</strong><br><br>

    教室は<br>
    <strong>{{ result.room }}</strong> です。
</div>
{% endif %}

{% if error %}
<div class="error">{{ error }}</div>
{% endif %}

</body>
</html>
